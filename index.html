<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxkio</title>

<link rel="icon" href="favicon.png">
<meta name="theme-color" content="#020617">

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
.container{max-width:430px;margin:auto;padding:20px}

.card{background:#0f172a;padding:16px;border-radius:16px;margin-bottom:14px}

button{padding:12px;border:none;border-radius:12px;font-weight:bold;margin-top:6px}
.btn{background:#2563eb;color:white}
.btn2{background:#334155;color:white}
.btn3{background:#16a34a;color:white}

input{width:100%;padding:10px;margin-bottom:8px;border-radius:10px;border:none}

.hidden{display:none}

.voice{
position:fixed;
bottom:20px;
right:20px;
background:#2563eb;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
}
</style>
</head>

<body>
<div class="container">

<h1>Oxkio</h1>

<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<button class="btn" onclick="login()">Entrar</button>
<button class="btn2" onclick="register()">Registro</button>
<div id="loginMsg"></div>
</div>

<div id="app" class="hidden">

<div class="card">
<div id="resumenTexto">Cargando...</div>
</div>

<div id="docsCard" class="card hidden">
<h3>Documentos</h3>
<div id="docsLista"></div>
</div>

<div id="agendaCard" class="card hidden">
<h3>Agenda</h3>
<div id="agenda"></div>
</div>

</div>

<div class="voice" onclick="iniciarVoz()">🎤</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey:"AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
authDomain:"oxkio-9af40.firebaseapp.com",
projectId:"oxkio-9af40"
});

const auth=getAuth(app);
const db=getFirestore(app);

let user=null;

window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch{loginMsg.innerText="Error";}
}

window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
}

onAuthStateChanged(auth, async(u)=>{
if(u){
user=u;
loginBox.style.display="none";
app.style.display="block";
cargarDocs();
}
});

async function cargarDocs(){
const snap=await getDocs(query(collection(db,"documentos"),where("user","==",user.uid)));
let html="";
snap.forEach(d=>{
const item=d.data();
html+=`<div><b>${item.nombre}</b></div>`;
});
docsLista.innerHTML=html||"Sin documentos";
}

function hablar(texto){
const msg=new SpeechSynthesisUtterance(texto);
msg.lang="es-ES";
speechSynthesis.speak(msg);
}

window.iniciarVoz=()=>{
const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;
const rec=new SpeechRecognition();

rec.lang="es-ES";
rec.start();

rec.onresult=(e)=>{
const texto=e.results[0][0].transcript.toLowerCase();

interpretar(texto);
};
}

function interpretar(texto){

if(texto.includes("documentos")){
docsCard.classList.remove("hidden");
hablar("Mostrando documentos");
}

else if(texto.includes("agenda")){
agendaCard.classList.remove("hidden");
hablar("Mostrando agenda");
}

else if(texto.includes("ocultar")){
docsCard.classList.add("hidden");
agendaCard.classList.add("hidden");
hablar("Pantalla limpia");
}

else{
hablar("No he entendido la orden");
}
}

</script>
</body>
</html>
