<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxkio</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
.container{max-width:430px;margin:auto;padding:20px}
.logo{width:96px;border-radius:20px;margin-bottom:10px}
.title{font-size:42px;font-weight:700;margin-bottom:20px}
.card{background:#0f172a;padding:20px;border-radius:20px;margin-bottom:20px}
input,select{width:100%;padding:14px;border-radius:12px;border:none;margin-bottom:10px}
button{padding:12px;border:none;border-radius:12px;font-weight:700;margin-top:5px}
.btn-primary{background:#2563eb;color:white}
.btn-danger{background:#dc2626;color:white}
.btn-success{background:#16a34a;color:white}
.section-title{font-size:22px;margin-bottom:10px}
.task{padding:10px 0;border-bottom:1px solid #334155}
.done{text-decoration:line-through;opacity:.5}
.msg{color:#cbd5e1}
</style>
</head>

<body>
<div class="container">

<img src="logo.png" class="logo">
<div class="title">Oxkio</div>

<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<button class="btn-primary" onclick="login()">Entrar</button>
<button onclick="register()">Registro</button>
<div id="loginMsg" class="msg"></div>
</div>

<div id="app" style="display:none;">

<div class="card">
<div id="userEmail"></div>
<button class="btn-danger" onclick="logout()">Salir</button>
<button onclick="toggleConfig()">Configuración CEO</button>
</div>

<div id="configBox" class="card" style="display:none;">
<div class="section-title">Configuración CEO</div>

<input id="carpetaDocs" placeholder="Ruta documentos (ej: Drive/Oxkio)">
<select id="usoCorreo">
<option value="no">No usar correo</option>
<option value="si">Usar correo</option>
</select>

<select id="usoCalendario">
<option value="no">No usar calendario externo</option>
<option value="si">Usar calendario externo</option>
</select>

<select id="controlDocs">
<option value="no">Sin control documental</option>
<option value="si">Control de renovaciones</option>
</select>

<button class="btn-primary" onclick="guardarConfig()">Guardar configuración</button>

</div>

<div class="card">
<div class="section-title">Entrada rápida</div>
<input id="entradaRapida">
<button class="btn-primary" onclick="procesarEntrada()">Añadir</button>
</div>

<div class="card">
<div class="section-title">Sugerencia Oxkio</div>
<div id="sugerencia"></div>
</div>

<div class="card">
<div class="section-title">Agenda</div>
<div id="agenda"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSy...",
authDomain: "oxkio-9af40.firebaseapp.com",
projectId: "oxkio-9af40"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;

window.toggleConfig=()=>{
configBox.style.display=configBox.style.display==="none"?"block":"none";
};

window.guardarConfig=async()=>{
await addDoc(collection(db,"config"),{
user:currentUser.uid,
carpeta:carpetaDocs.value,
correo:usoCorreo.value,
calendario:usoCalendario.value,
docs:controlDocs.value
});
};

window.procesarEntrada=async()=>{
let t=entradaRapida.value;
await addDoc(collection(db,"tareas"),{
titulo:t,
fecha:new Date().toLocaleDateString(),
user:currentUser.uid,
estado:"pendiente"
});
cargar();
};

async function cargar(){
const q=query(collection(db,"tareas"),where("user","==",currentUser.uid));
const snap=await getDocs(q);

agenda.innerHTML="";
let tareas=[];
snap.forEach(d=>tareas.push(d.data()));

tareas.forEach(t=>{
agenda.innerHTML+=`<div class="task">${t.titulo}</div>`;
});

analizar(tareas);
}

function analizar(tareas){

let sobrecarga=tareas.length>5;

if(sobrecarga){
sugerencia.innerText="Tienes demasiadas tareas. Oxkio recomienda reorganizar.";
}else{
sugerencia.innerText="Carga equilibrada.";
}

}

window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.logout=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
if(u){
currentUser=u;
loginBox.style.display="none";
app.style.display="block";
userEmail.innerText=u.email;
cargar();
}
});

</script>

</body>
</html>
