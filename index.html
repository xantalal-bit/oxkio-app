<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Oxkio</title>
  <style>
    body{
      margin:0;
      padding:20px;
      background:#020617;
      color:white;
      font-family:Arial,sans-serif;
    }

    .box{
      max-width:700px;
      margin:auto;
    }

    .logo{
      width:70px;
      height:70px;
      border-radius:14px;
      background:#111827;
      display:flex;
      align-items:center;
      justify-content:center;
      margin-bottom:16px;
      overflow:hidden;
      border:1px solid #334155;
    }

    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }

    input, textarea{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #475569;
      font-size:16px;
    }

    textarea{
      min-height:120px;
      resize:vertical;
    }

    button{
      margin-top:10px;
      margin-right:8px;
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
    }

    .secondary{
      background:#334155;
    }

    .danger{
      background:#991b1b;
    }

    .card{
      margin-top:20px;
      background:#111827;
      padding:16px;
      border-radius:12px;
    }

    .item{
      padding:10px 0;
      border-bottom:1px solid #334155;
    }

    .item:last-child{
      border-bottom:none;
    }

    .muted{
      color:#cbd5e1;
    }

    a{
      color:#60a5fa;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }

    .userbox{
      background:#0f172a;
      padding:10px 14px;
      border-radius:10px;
      color:#cbd5e1;
    }
  </style>
</head>
<body>
  <div class="box">

    <!-- ENTRADA -->
    <div id="loginBox">
      <div class="logo">
        <!-- CAMBIAR LUEGO POR EL LOGO REAL -->
        <span style="font-size:30px;font-weight:bold;">O</span>
      </div>

      <h1>Oxkio</h1>
      <p class="muted">Acceso administrador</p>

      <button onclick="entrarAdmin()">Entrar</button>
    </div>

    <!-- APP -->
    <div id="appBox" style="display:none;">
      <div class="topbar">
        <div>
          <div class="logo">
            <!-- CAMBIAR LUEGO POR EL LOGO REAL -->
            <span style="font-size:30px;font-weight:bold;">O</span>
          </div>
          <h1 style="margin:0;">Oxkio</h1>
          <p class="muted" style="margin-top:6px;">Base operativa</p>
        </div>

        <div>
          <div class="userbox">Usuario activo: <b>admin</b></div>
          <button class="danger" onclick="salir()">Salir</button>
        </div>
      </div>

      <div class="card">
        <h2>Petición a Oxkio</h2>
        <textarea id="input" placeholder="Escribe tu petición"></textarea>
        <button onclick="responder()">Enviar</button>
        <div id="out" class="card"></div>
      </div>

      <div class="card">
        <h2>Agenda y avisos</h2>
        <input id="titulo" placeholder="Título" />
        <input id="fecha" placeholder="Fecha" />
        <input id="tipo" placeholder="Tipo" />
        <button onclick="guardarAgenda()">Guardar</button>
        <button class="secondary" onclick="verAgenda()">Ver agenda</button>
        <div id="agenda" class="card"></div>
      </div>

      <div class="card">
        <h2>Documentos</h2>
        <input id="docNombre" placeholder="Nombre documento" />
        <input id="docTipo" placeholder="Tipo" />
        <input id="docNota" placeholder="Nota" />
        <input id="docLink" placeholder="Enlace Google Drive" />
        <button onclick="guardarDoc()">Guardar documento</button>
        <button class="secondary" onclick="verDocs()">Ver documentos</button>
        <div id="docs" class="card"></div>
      </div>
    </div>

  </div>

  <script>
    function entrarAdmin() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('appBox').style.display = 'block';
      localStorage.setItem('oxkio_session', 'admin');
      verAgenda();
      verDocs();
    }

    function salir() {
      localStorage.removeItem('oxkio_session');
      document.getElementById('appBox').style.display = 'none';
      document.getElementById('loginBox').style.display = 'block';
    }

    function responder() {
      var t = document.getElementById('input').value.toLowerCase();
      var r = 'Resumen: petición recibida\\nPropuesta: analizar y estructurar\\nAcción: ¿Deseas continuar?';

      if (t.indexOf('agenda') !== -1 || t.indexOf('día') !== -1 || t.indexOf('dia') !== -1) {
        r = 'Resumen: organizar tu jornada\\nPropuesta: revisar citas y avisos\\nAcción: usa la agenda inferior.';
      } else if (t.indexOf('correo') !== -1 || t.indexOf('email') !== -1) {
        r = 'Resumen: gestión de correos\\nPropuesta: clasificar y responder\\nAcción: siguiente fase, conectar Gmail.';
      } else if (t.indexOf('dni') !== -1 || t.indexOf('seguro') !== -1 || t.indexOf('renovar') !== -1) {
        r = 'Resumen: aviso importante detectado\\nPropuesta: guardarlo en agenda y documentos\\nAcción: añade título, fecha y tipo abajo.';
      } else if (t.indexOf('cliente') !== -1 || t.indexOf('ventas') !== -1 || t.indexOf('erp') !== -1) {
        r = 'Resumen: petición comercial detectada\\nPropuesta: preparar flujo de ventas y búsqueda automática\\nAcción: siguiente fase, conectar CRM y correo.';
      }

      document.getElementById('out').innerText = 'Oxkio:\\n\\n' + r;
    }

    function guardarAgenda() {
      var titulo = document.getElementById('titulo').value.trim();
      var fecha = document.getElementById('fecha').value.trim();
      var tipo = document.getElementById('tipo').value.trim();

      if (!titulo || !fecha || !tipo) {
        document.getElementById('agenda').innerText = 'Completa título, fecha y tipo.';
        return;
      }

      var agenda = JSON.parse(localStorage.getItem('oxkio_agenda') || '[]');
      agenda.push({ titulo: titulo, fecha: fecha, tipo: tipo });
      localStorage.setItem('oxkio_agenda', JSON.stringify(agenda));

      document.getElementById('titulo').value = '';
      document.getElementById('fecha').value = '';
      document.getElementById('tipo').value = '';

      verAgenda();
    }

    function verAgenda() {
      var agenda = JSON.parse(localStorage.getItem('oxkio_agenda') || '[]');
      var html = '<b>Elementos guardados</b><br><br>';

      if (agenda.length === 0) {
        html += 'No hay citas ni avisos todavía.';
      } else {
        for (var i = 0; i < agenda.length; i++) {
          html += '<div class="item"><b>' + (i + 1) + '. ' + agenda[i].titulo + '</b><br>Fecha: ' + agenda[i].fecha + '<br>Tipo: ' + agenda[i].tipo + '</div>';
        }
      }

      document.getElementById('agenda').innerHTML = html;
    }

    function guardarDoc() {
      var nombre = document.getElementById('docNombre').value.trim();
      var tipo = document.getElementById('docTipo').value.trim();
      var nota = document.getElementById('docNota').value.trim();
      var link = document.getElementById('docLink').value.trim();

      if (!nombre) {
        document.getElementById('docs').innerText = 'Añade al menos nombre.';
        return;
      }

      var docs = JSON.parse(localStorage.getItem('oxkio_docs') || '[]');
      docs.push({ nombre: nombre, tipo: tipo, nota: nota, link: link });
      localStorage.setItem('oxkio_docs', JSON.stringify(docs));

      document.getElementById('docNombre').value = '';
      document.getElementById('docTipo').value = '';
      document.getElementById('docNota').value = '';
      document.getElementById('docLink').value = '';

      verDocs();
    }

    function verDocs() {
      var docs = JSON.parse(localStorage.getItem('oxkio_docs') || '[]');
      var html = '<b>Documentos guardados</b><br><br>';

      if (docs.length === 0) {
        html += 'No hay documentos.';
      } else {
        for (var i = 0; i < docs.length; i++) {
          html += '<div class="item"><b>' + (i + 1) + '. ' + docs[i].nombre + '</b><br>Tipo: ' + docs[i].tipo + '<br>Nota: ' + docs[i].nota + '<br>' + (docs[i].link ? '<a href="' + docs[i].link + '" target="_blank">Abrir documento</a>' : '') + '</div>';
        }
      }

      document.getElementById('docs').innerHTML = html;
    }

    window.onload = function() {
      var sesion = localStorage.getItem('oxkio_session');
      if (sesion === 'admin') {
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block';
        verAgenda();
        verDocs();
      }
    };
  </script>
</body>
</html>
