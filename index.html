<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxkio</title>

<link rel="icon" type="image/png" href="favicon.png">
<meta name="theme-color" content="#020617">

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
.container{max-width:430px;margin:auto;padding:20px}

.card{background:#0f172a;padding:16px;border-radius:16px;margin-bottom:14px}

.section-title{
  font-size:18px;
  font-weight:700;
  cursor:pointer;
  display:flex;
  justify-content:space-between;
}

.section-title::after{content:"▼";font-size:12px}
.section-title.active::after{content:"▲"}

.hidden{display:none}

button{
  padding:10px;
  border:none;
  border-radius:10px;
  margin-top:6px;
  font-weight:bold;
}

.btn{background:#2563eb;color:white}
.btn2{background:#334155;color:white}
.btn3{background:#16a34a;color:white}

input,select,textarea{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  border:none;
}
</style>
</head>

<body>
<div class="container">

<h1>Oxkio</h1>

<!-- LOGIN -->
<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<button class="btn" onclick="login()">Entrar</button>
<button class="btn2" onclick="register()">Registro</button>
<div id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<!-- RESUMEN (VISIBLE) -->
<div class="card">
<div class="section-title active" onclick="toggle('resumen')">Resumen</div>
<div id="resumen">
<div id="resumenTexto">Cargando...</div>
</div>
</div>

<!-- SUGERENCIA -->
<div class="card">
<div class="section-title active" onclick="toggle('sugerencia')">Sugerencia Oxkio</div>
<div id="sugerencia">...</div>
</div>

<!-- HOY -->
<div class="card">
<div class="section-title active" onclick="toggle('hoy')">Hoy</div>
<div id="hoy"></div>
</div>

<!-- URGENTES -->
<div class="card">
<div class="section-title active" onclick="toggle('urgentes')">Urgentes</div>
<div id="urgentes"></div>
</div>

<!-- DOCUMENTOS -->
<div class="card">
<div class="section-title" onclick="toggle('docs')">Documentos</div>
<div id="docs" class="hidden">
<div id="docsLista"></div>
</div>
</div>

<!-- CONTROL -->
<div class="card">
<div class="section-title" onclick="toggle('control')">Centro de control</div>
<div id="control" class="hidden">

<input id="regla" placeholder="Nueva regla">
<button class="btn" onclick="guardarRegla()">Guardar regla</button>

<input id="incidencia" placeholder="Incidencia">
<button class="btn2" onclick="guardarIncidencia()">Registrar</button>

<div id="controlContenido"></div>

</div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
apiKey: "AIzaSy...",
authDomain: "oxkio-9af40.firebaseapp.com",
projectId: "oxkio-9af40"
});

const auth = getAuth(app);
const db = getFirestore(app);

let user=null;

function toggle(id){
const el=document.getElementById(id);
el.classList.toggle("hidden");
}

window.login=async()=>{
try{
await signInWithEmailAndPassword(auth,email.value,password.value);
}catch{loginMsg.innerText="Error";}
}

window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
}

onAuthStateChanged(auth, async(u)=>{
if(u){
user=u;
loginBox.style.display="none";
app.style.display="block";
cargarDocs();
}
});

async function cargarDocs(){
const snap=await getDocs(query(collection(db,"documentos"),where("user","==",user.uid)));
let html="";
snap.forEach(d=>{
const item=d.data();

html+=`
<div>
<b>${item.nombre}</b><br>
${item.tipo}<br>

<button onclick="asignar('${d.id}')">Asignar carpeta</button>
</div>
`;
});
docsLista.innerHTML=html||"Sin docs";
}

window.asignar=async(id)=>{
const c=prompt("Carpeta:");
await updateDoc(doc(db,"documentos",id),{carpeta:c});
cargarDocs();
}

window.guardarRegla=async()=>{
await addDoc(collection(db,"reglas"),{texto:regla.value,user:user.uid});
regla.value="";
}

window.guardarIncidencia=async()=>{
await addDoc(collection(db,"incidencias"),{texto:incidencia.value,user:user.uid});
incidencia.value="";
}

</script>
</body>
</html>
