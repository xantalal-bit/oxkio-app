
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oxkio</title>

<style>
body{margin:0;background:#020617;color:white;font-family:Arial}
.container{max-width:430px;margin:auto;padding:20px}
.logo{width:96px;border-radius:20px;margin-bottom:10px}
.title{font-size:42px;font-weight:700;margin-bottom:20px}
.card{background:#0f172a;padding:20px;border-radius:20px;margin-bottom:20px}
input,select{width:100%;padding:14px;border-radius:12px;border:none;margin-bottom:10px}
button{padding:12px;border:none;border-radius:12px;font-weight:700;margin-top:5px}
.btn-primary{background:#2563eb;color:white}
.btn-danger{background:#dc2626;color:white}
.btn-success{background:#16a34a;color:white}
.section-title{font-size:22px;margin-bottom:10px}
.task{padding:10px 0;border-bottom:1px solid #334155}
.done{text-decoration:line-through;opacity:.5}
.msg{color:#cbd5e1}
</style>
</head>

<body>
<div class="container">

<img src="logo.png" class="logo">
<div class="title">Oxkio</div>

<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Contraseña">
<button class="btn-primary" onclick="login()">Entrar</button>
<button onclick="register()">Registro</button>
<div id="loginMsg" class="msg"></div>
</div>

<div id="app" style="display:none;">

<div class="card">
<div id="userEmail"></div>
<button class="btn-danger" onclick="logout()">Salir</button>
<button onclick="config()">Configuración</button>
</div>

<div id="configBox" class="card" style="display:none;">
<div class="section-title">Configuración</div>
<button class="btn-danger" onclick="resetApp()">Reiniciar entorno de pruebas</button>
</div>

<div class="card">
<div class="section-title">Nuevo evento</div>
<input id="titulo" placeholder="Título">
<input id="fecha" placeholder="DD/MM/AAAA o 13042026">
<input id="tipo" placeholder="Tipo">
<button class="btn-primary" onclick="guardar()">Guardar</button>
<div id="agendaMsg" class="msg"></div>
</div>

<div class="card">
<div class="section-title">Hoy</div>
<div id="hoy"></div>
</div>

<div class="card">
<div class="section-title">Agenda completa</div>
<div id="agenda"></div>
</div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
  authDomain: "oxkio-9af40.firebaseapp.com",
  projectId: "oxkio-9af40"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser=null;

function formatFecha(f){
if(f.length===8){
return f.slice(0,2)+"/"+f.slice(2,4)+"/"+f.slice(4);
}
return f;
}

window.guardar=async()=>{
let f=formatFecha(fecha.value);
await addDoc(collection(db,"tareas"),{
titulo:titulo.value,
fecha:f,
tipo:tipo.value,
estado:"pendiente",
user:currentUser.uid
});
cargar();
};

async function cargar(){
const q=query(collection(db,"tareas"),where("user","==",currentUser.uid));
const snap=await getDocs(q);

hoy.innerHTML="";
agenda.innerHTML="";

snap.forEach(d=>{
const i=d.data();

let div=document.createElement("div");
div.className="task";
div.innerHTML=`<b>${i.titulo}</b><br>${i.fecha}`;
agenda.appendChild(div);

if(i.fecha===new Date().toLocaleDateString("es-ES")){
hoy.appendChild(div.cloneNode(true));
}
});
}

window.resetApp=async()=>{
if(!confirm("¿Estás seguro?"))return;

const q=query(collection(db,"tareas"),where("user","==",currentUser.uid));
const snap=await getDocs(q);

snap.forEach(async d=>{
await deleteDoc(doc(db,"tareas",d.id));
});

cargar();
};

window.config=()=>{
configBox.style.display=configBox.style.display==="none"?"block":"none";
};

window.login=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value);
};

window.register=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value);
};

window.logout=()=>signOut(auth);

onAuthStateChanged(auth,u=>{
if(u){
currentUser=u;
loginBox.style.display="none";
app.style.display="block";
userEmail.innerText=u.email;
cargar();
}
});
</script>

</body>
</html>
