<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oxkio</title>
  <style>
    body{
      margin:0;
      padding:20px;
      background:#020617;
      color:white;
      font-family:Arial,sans-serif;
    }
    .box{max-width:680px;margin:auto;}
    input,textarea{
      width:100%;
      box-sizing:border-box;
      padding:12px;
      margin-top:10px;
      border-radius:10px;
      border:1px solid #475569;
      font-size:16px;
    }
    textarea{min-height:120px;}
    button{
      margin-top:10px;
      padding:10px 16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-size:16px;
    }
    .card{
      margin-top:20px;
      background:#111827;
      padding:16px;
      border-radius:12px;
    }
    .item{
      padding:10px 0;
      border-bottom:1px solid #334155;
    }
    .item:last-child{border-bottom:none;}
  </style>
</head>
<body>
  <div class="box">

    <div id="loginBox">
      <h1>Acceso Oxkio</h1>
      <input id="user" placeholder="Usuario">
      <input id="pass" type="password" placeholder="Contraseña">
      <button onclick="login()">Entrar</button>
      <p id="error" style="color:#f87171;"></p>
    </div>

    <div id="appBox" style="display:none;">
      <h1>Oxkio</h1>
      <p id="who"></p>

      <div class="card">
        <p>Escribe tu petición</p>
        <textarea id="input"></textarea>
        <button onclick="responder()">Enviar</button>
        <div id="out" class="card"></div>
      </div>

      <div class="card">
        <h2>Agenda y avisos</h2>
        <input id="titulo" placeholder="Título">
        <input id="fecha" placeholder="Fecha">
        <input id="tipo" placeholder="Tipo">
        <button onclick="guardarAgenda()">Guardar</button>
        <button onclick="verAgenda()">Ver agenda</button>
        <div id="agenda" class="card"></div>
      </div>
    </div>

  </div>

  <script>
    function login() {
      var u = document.getElementById('user').value.trim();
      var p = document.getElementById('pass').value.trim();

      if ((u === 'admin' && p === 'admin123') || (u === 'user' && p === '1234')) {
        localStorage.setItem('oxkio_user', u);
        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('appBox').style.display = 'block';
        document.getElementById('who').innerText = 'Usuario activo: ' + u;
        verAgenda();
      } else {
        document.getElementById('error').innerText = 'Acceso incorrecto';
      }
    }

    function responder() {
      var t = document.getElementById('input').value.toLowerCase();
      var r = 'Resumen: petición recibida\\nPropuesta: analizar y estructurar\\nAcción: ¿Deseas continuar?';

      if (t.indexOf('agenda') !== -1 || t.indexOf('día') !== -1 || t.indexOf('dia') !== -1) {
        r = 'Resumen: organizar tu jornada\\nPropuesta: revisar citas y avisos\\nAcción: usa la agenda inferior.';
      }

      document.getElementById('out').innerText = 'Oxkio:\\n\\n' + r;
    }

    function guardarAgenda() {
      var u = localStorage.getItem('oxkio_user') || 'anon';
      var key = 'oxkio_agenda_' + u;

      var titulo = document.getElementById('titulo').value.trim();
      var fecha = document.getElementById('fecha').value.trim();
      var tipo = document.getElementById('tipo').value.trim();

      if (!titulo || !fecha || !tipo) {
        document.getElementById('agenda').innerText = 'Completa título, fecha y tipo.';
        return;
      }

      var agenda = JSON.parse(localStorage.getItem(key) || '[]');
      agenda.push({ titulo: titulo, fecha: fecha, tipo: tipo });
      localStorage.setItem(key, JSON.stringify(agenda));

      document.getElementById('titulo').value = '';
      document.getElementById('fecha').value = '';
      document.getElementById('tipo').value = '';

      verAgenda();
    }

    function verAgenda() {
      var u = localStorage.getItem('oxkio_user') || 'anon';
      var key = 'oxkio_agenda_' + u;
      var agenda = JSON.parse(localStorage.getItem(key) || '[]');

      var html = '<b>Elementos guardados</b><br><br>';

      if (agenda.length === 0) {
        html += 'No hay citas ni avisos todavía.';
      } else {
        for (var i = 0; i < agenda.length; i++) {
          html += '<div class="item"><b>' + (i + 1) + '. ' + agenda[i].titulo + '</b><br>Fecha: ' + agenda[i].fecha + '<br>Tipo: ' + agenda[i].tipo + '</div>';
        }
      }

      document.getElementById('agenda').innerHTML = html;
    }
  </script>
</body>
</html>
