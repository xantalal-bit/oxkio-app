<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oxkio</title>
  <style>
    body{
      margin:0;
      background:#020617;
      color:white;
      font-family:Arial,sans-serif;
    }
    .container{
      max-width:420px;
      margin:0 auto;
      padding:20px;
    }
    .logo{
      width:90px;
      height:90px;
      border-radius:20px;
      margin-bottom:12px;
      object-fit:cover;
      background:#111827;
      display:block;
    }
    .title{
      font-size:42px;
      font-weight:700;
      margin:0 0 20px 0;
    }
    .card{
      background:#0f172a;
      padding:20px;
      border-radius:18px;
      margin-bottom:20px;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      border-radius:12px;
      border:none;
      margin-bottom:12px;
      font-size:16px;
    }
    button{
      padding:12px 18px;
      border-radius:12px;
      border:none;
      font-weight:700;
      cursor:pointer;
      margin:6px 8px 0 0;
    }
    .btn-primary{ background:#2563eb; color:white; }
    .btn-secondary{ background:#334155; color:white; }
    .btn-danger{ background:#dc2626; color:white; }
    .btn-success{ background:#16a34a; color:white; }
    .section-title{
      font-size:22px;
      margin:0 0 10px 0;
    }
    .task{
      padding:12px 0;
      border-bottom:1px solid #334155;
    }
    .task:last-child{ border-bottom:none; }
    .done{
      text-decoration:line-through;
      opacity:.55;
    }
    .tag{
      background:#1e293b;
      padding:6px 10px;
      border-radius:10px;
      display:inline-block;
      margin-top:6px;
      font-size:13px;
    }
    .msg{
      color:#cbd5e1;
      margin-top:10px;
      line-height:1.4;
    }
    #loading{
      display:block;
    }
    #loginBox,
    #app{
      display:none;
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="logo.png" class="logo" alt="Oxkio logo">
    <div class="title">Oxkio</div>

    <div id="loading" class="card">
      <div class="section-title">Cargando</div>
      <div class="msg">Comprobando acceso...</div>
    </div>

    <div id="loginBox" class="card">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Contraseña">
      <button class="btn-primary" onclick="login()">Entrar</button>
      <button class="btn-secondary" onclick="register()">Registrarme</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="app">
      <div class="card">
        <div id="userEmail" class="msg" style="margin-top:0;"></div>
        <button class="btn-danger" onclick="logout()">Salir</button>
      </div>

      <div class="card">
        <div class="section-title">Nueva tarea</div>
        <input id="titulo" placeholder="Título">
        <input id="fecha" placeholder="DD/MM/AAAA">
        <input id="tipo" placeholder="Tipo">
        <button class="btn-primary" onclick="guardar()">Guardar</button>
        <div id="agendaMsg" class="msg"></div>
      </div>

      <div class="card">
        <div class="section-title">Hoy</div>
        <div id="hoy">Nada hoy</div>
      </div>

      <div class="card">
        <div class="section-title">Próximos días</div>
        <div id="proximos">Nada en próximos días</div>
      </div>

      <div class="card">
        <div class="section-title">Agenda completa</div>
        <div id="agenda">Sin datos</div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      signOut,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      updateDoc,
      doc,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
      authDomain: "oxkio-9af40.firebaseapp.com",
      projectId: "oxkio-9af40",
      storageBucket: "oxkio-9af40.firebasestorage.app",
      messagingSenderId: "975887789346",
      appId: "1:975887789346:web:fa581107285b989d90897b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    const loadingBox = document.getElementById("loading");
    const loginBox = document.getElementById("loginBox");
    const appBox = document.getElementById("app");
    const userEmail = document.getElementById("userEmail");
    const loginMsg = document.getElementById("loginMsg");
    const agendaMsg = document.getElementById("agendaMsg");

    function parseFecha(str) {
      if (!str) return null;
      const p = str.split("/");
      if (p.length !== 3) return null;

      const d = parseInt(p[0], 10);
      const m = parseInt(p[1], 10) - 1;
      const y = parseInt(p[2], 10);

      const fecha = new Date(y, m, d);
      if (
        fecha.getFullYear() !== y ||
        fecha.getMonth() !== m ||
        fecha.getDate() !== d
      ) return null;

      fecha.setHours(0,0,0,0);
      return fecha;
    }

    function hoyStr() {
      const h = new Date();
      return `${String(h.getDate()).padStart(2,"0")}/${String(h.getMonth()+1).padStart(2,"0")}/${h.getFullYear()}`;
    }

    function diasHasta(fecha) {
      const h = new Date();
      h.setHours(0,0,0,0);
      return Math.round((fecha - h) / 86400000);
    }

    function mostrarLogin(msg = "") {
      loadingBox.style.display = "none";
      appBox.style.display = "none";
      loginBox.style.display = "block";
      loginMsg.textContent = msg;
    }

    function mostrarApp(email) {
      loadingBox.style.display = "none";
      loginBox.style.display = "none";
      appBox.style.display = "block";
      userEmail.textContent = email;
    }

    window.login = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      loginMsg.textContent = "";

      if (!email || !password) {
        loginMsg.textContent = "Escribe email y contraseña.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        loginMsg.textContent = "Email o contraseña incorrectos.";
      }
    };

    window.register = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      loginMsg.textContent = "";

      if (!email || !password) {
        loginMsg.textContent = "Escribe email y contraseña.";
        return;
      }

      if (password.length < 6) {
        loginMsg.textContent = "La contraseña debe tener al menos 6 caracteres.";
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (e) {
        if (e.code === "auth/email-already-in-use") {
          loginMsg.textContent = "Ese email ya está registrado. Pulsa Entrar.";
        } else {
          loginMsg.textContent = "No se pudo registrar.";
        }
      }
    };

    window.logout = async function () {
      await signOut(auth);
    };

    window.guardar = async function () {
      const titulo = document.getElementById("titulo").value.trim();
      const fecha = document.getElementById("fecha").value.trim();
      const tipo = document.getElementById("tipo").value.trim();

      if (!currentUser) {
        agendaMsg.textContent = "Debes iniciar sesión.";
        return;
      }

      if (!titulo || !fecha || !tipo) {
        agendaMsg.textContent = "Completa título, fecha y tipo.";
        return;
      }

      if (!parseFecha(fecha)) {
        agendaMsg.textContent = "Fecha en formato DD/MM/AAAA.";
        return;
      }

      try {
        await addDoc(collection(db, "tareas"), {
          titulo,
          fecha,
          tipo,
          estado: "pendiente",
          user: currentUser.uid,
          createdAt: Date.now()
        });

        document.getElementById("titulo").value = "";
        document.getElementById("fecha").value = "";
        document.getElementById("tipo").value = "";
        agendaMsg.textContent = "Guardado.";
        await cargar();
      } catch (e) {
        agendaMsg.textContent = "No se pudo guardar.";
      }
    };

    window.marcar = async function (id) {
      await updateDoc(doc(db, "tareas", id), { estado: "hecho" });
      await cargar();
    };

    async function cargar() {
      if (!currentUser) return;

      const hoy = document.getElementById("hoy");
      const proximos = document.getElementById("proximos");
      const agenda = document.getElementById("agenda");

      hoy.innerHTML = "Cargando...";
      proximos.innerHTML = "Cargando...";
      agenda.innerHTML = "Cargando...";

      const q = query(collection(db, "tareas"), where("user", "==", currentUser.uid));
      const snapshot = await getDocs(q);

      const items = [];
      snapshot.forEach((d) => {
        items.push({ id: d.id, ...d.data() });
      });

      items.sort((a, b) => {
        const fa = parseFecha(a.fecha);
        const fb = parseFecha(b.fecha);
        if (fa && fb) return fa - fb;
        return (a.createdAt || 0) - (b.createdAt || 0);
      });

      let hoyHTML = "";
      let proximosHTML = "";
      let agendaHTML = "";

      for (const item of items) {
        const fechaObj = parseFecha(item.fecha);
        const diff = fechaObj ? diasHasta(fechaObj) : null;

        agendaHTML += `
          <div class="task ${item.estado === "hecho" ? "done" : ""}">
            <b>${item.titulo}</b><br>
            ${item.fecha} - ${item.tipo}<br>
            <span class="tag">${item.estado === "hecho" ? "Realizado" : "Pendiente"}</span>
            ${item.estado === "pendiente" ? `<br><button class="btn-success" onclick="marcar('${item.id}')">Hecho</button>` : ""}
          </div>
        `;

        if (item.estado === "hecho") continue;

        if (item.fecha === hoyStr()) {
          hoyHTML += `
            <div class="task">
              <b>${item.titulo}</b><br>
              <span class="tag">Hoy</span><br>
              <button class="btn-success" onclick="marcar('${item.id}')">Hecho</button>
            </div>
          `;
        }

        if (diff !== null && diff >= 0 && diff <= 7) {
          proximosHTML += `
            <div class="task">
              <b>${item.titulo}</b><br>
              <span class="tag">En ${diff} día(s)</span><br>
              <button class="btn-success" onclick="marcar('${item.id}')">Hecho</button>
            </div>
          `;
        }
      }

      hoy.innerHTML = hoyHTML || "Nada hoy";
      proximos.innerHTML = proximosHTML || "Nada en próximos días";
      agenda.innerHTML = agendaHTML || "Sin datos";
    }

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        mostrarApp(user.email);
        await cargar();
      } else {
        currentUser = null;
        mostrarLogin("");
      }
    });
  </script>
</body>
</html>
