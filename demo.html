function login(){
  let u = document.getElementById("user").value.trim();
  let p = document.getElementById("pass").value.trim();

  let rol = "";

  if(u==="admin" && p==="admin123"){
    rol = "admin";
  }
  else if(u==="user" && p==="1234"){
    rol = "user";
  }
  else{
    document.getElementById("error").innerText="Acceso incorrecto";
    return;
  }

  localStorage.setItem("oxkio_rol", rol);

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
}
localStorage.setItem("oxkio_user", u);
function responder(){
  let t = document.getElementById("input").value.toLowerCase();
  let r = "";

    r = "Resumen: organizar tu jornada\nPropuesta: revisar citas y avisos\nAcción: utiliza el bloque de agenda para guardar o consultar.";
  }
  else if(t.includes("correo")){
    r = "Resumen: gestión de correos\nPropuesta: clasificar y responder\nAcción: ¿Deseas que redacte?";
  }
  else if(t.includes("renovar") || t.includes("seguro") || t.includes("médico") || t.includes("medico")){

  }
  else{
    r = "Resumen: petición recibida\nPropuesta: analizar y estructurar\nAcción: ¿Deseas continuar?";
  }

  document.getElementById("out").innerText = "Oxkio:\n\n" + r;
}
