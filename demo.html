<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oxkio App</title>
<style>
body{font-family:Arial;background:#020617;color:white;margin:0;padding:20px}
.box{max-width:600px;margin:auto}
textarea{width:100%;height:100px;border-radius:10px;padding:10px}
button{padding:10px 15px;margin-top:10px;border:none;border-radius:8px;background:#2563eb;color:white}
.respuesta{margin-top:20px;background:#111;padding:15px;border-radius:10px}
</style>
</head>
<body>
<div class="box">

<div id="login">
<h3>Acceso Oxkio</h3>
<input id="user" placeholder="Usuario"><br><br>
<input id="pass" type="password" placeholder="Contraseña"><br><br>
<button onclick="login()">Entrar</button>
<p id="error" style="color:red;"></p>
</div>

<h2>Oxkio</h2>
<p>Escribe tu petición</p>

<textarea id="input"></textarea>
<button onclick="responder()">Enviar</button>

<div id="out" class="respuesta"></div>
<h2>Oxkio</h2>
<p>Escribe tu petición</p>

<textarea id="input"></textarea>
<button onclick="responder()">Enviar</button>

<div id="out" class="respuesta"></div>
</div>

<script>
function responder(){
  let t=document.getElementById("input").value.toLowerCase();

  let r="";

  if(t.includes("día") || t.includes("agenda")){
    r="Resumen: organizar tu jornada\nPropuesta: priorizar tareas y citas\nAcción: ¿Quieres que cree tu agenda?";
  }
  else if(t.includes("correo") || t.includes("email")){
    r="Resumen: gestión de correos\nPropuesta: clasificar y responder\nAcción: ¿Quieres que redacte respuesta?";
  }
  else if(t.includes("proceso") || t.includes("automat")){
    r="Resumen: optimización de proceso\nPropuesta: automatizar tareas repetitivas\nAcción: ¿Quieres propuesta concreta?";
  }
  else{
    r="Resumen: petición recibida\nPropuesta: analizar y estructurar\nAcción: ¿Deseas continuar?";
  }

  document.getElementById("out").innerText="Oxkio:\n\n"+r;
}
let t=document.getElementById("input").value;
document.getElementById("out").innerText=
"Oxkio:\n\nResumen: petición recibida\nPropuesta: organizar y ejecutar\nAcción: ¿Deseas continuar?";
}
</script>
</body>
</html>
</div>

<script>
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="admin123"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("error").innerText="Acceso incorrecto";
  }
}
</script>
