<!DOCTYPE html>
<html lang="es">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oxkio</title>

<style>
body{
  font-family:Arial;
  background:#020617;
  color:white;
  margin:0;
  padding:20px;
}

.box{
  max-width:600px;
  margin:auto;
}

input, textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  margin-top:10px;
}

button{
  padding:10px 15px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:#2563eb;
  color:white;
}

.respuesta{
  margin-top:20px;
  background:#111;
  padding:15px;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="box">

<!-- LOGIN -->
<div id="login">
<h2>Acceso Oxkio</h2>

<input id="user" placeholder="Usuario">
<input id="pass" type="password" placeholder="Contraseña">

<button onclick="login()">Entrar</button>
<p id="error" style="color:red;"></p>
</div>

<!-- APP -->
<div id="app" style="display:none;">
<h2>Oxkio</h2>
<p>Escribe tu petición</p>

<textarea id="input"></textarea>
<button onclick="responder()">Enviar</button>

<div id="out" class="respuesta"></div>
</div>

</div>

<script>
function login(){
  let u=document.getElementById("user").value;
  let p=document.getElementById("pass").value;

  if(u==="admin" && p==="admin123"){
    document.getElementById("login").style.display="none";
    document.getElementById("app").style.display="block";
  }else{
    document.getElementById("error").innerText="Acceso incorrecto";
  }
}

function responder(){
  let t=document.getElementById("input").value.toLowerCase();
  let r="";

  if(t.includes("agenda") || t.includes("día")){
    r="Resumen: organizar tu jornada\nPropuesta: crear agenda\nAcción: ¿Deseas que la prepare?";
  }
  else if(t.includes("correo")){
    r="Resumen: gestión de correos\nPropuesta: clasificar y responder\nAcción: ¿Deseas que redacte?";
  }
  else{
    r="Resumen: petición recibida\nPropuesta: analizar y estructurar\nAcción: ¿Deseas continuar?";
  }

  document.getElementById("out").innerText="Oxkio:\n\n"+r;
}
</script>

</body>
</html>
