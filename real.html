<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oxkio Real</title>

<style>
body{margin:0;padding:20px;background:#020617;color:white;font-family:Arial}
.box{max-width:700px;margin:auto}
.logo{width:70px;height:70px;border-radius:14px;background:#111827;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden}
.logo img{width:100%;height:100%}
input{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none}
button{margin-top:10px;padding:10px;border:none;border-radius:10px;background:#2563eb;color:white}
.danger{background:#991b1b}
.card{margin-top:20px;background:#111827;padding:16px;border-radius:12px}
.item{border-bottom:1px solid #334155;padding:10px 0}
</style>
</head>

<body>
<div class="box">

<div class="logo">
<img src="logo.PNG">
</div>

<h1>Oxkio PRO</h1>

<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" placeholder="Contraseña">
<button onclick="registrar()">Registrarme</button>
<button onclick="entrar()">Entrar</button>
<p id="msg"></p>
</div>

<div id="appBox" style="display:none">

<p>Usuario: <b id="usuarioActivo"></b></p>
<button class="danger" onclick="salir()">Salir</button>

<div class="card">
<h3>Nueva tarea</h3>
<input id="titulo" placeholder="Título">
<input id="fecha" placeholder="Fecha">
<input id="tipo" placeholder="Tipo">
<button onclick="guardar()">Guardar</button>
</div>

<div class="card">
<h3>Mi agenda</h3>
<div id="lista"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "PEGA_AQUI",
  authDomain: "PEGA_AQUI",
  projectId: "PEGA_AQUI",
  storageBucket: "PEGA_AQUI",
  messagingSenderId: "PEGA_AQUI",
  appId: "PEGA_AQUI"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.registrar = async () => {
let e = email.value;
let p = password.value;
try{
await createUserWithEmailAndPassword(auth,e,p);
msg.innerText="Registrado";
}catch{
msg.innerText="Error";
}
};

window.entrar = async () => {
let e = email.value;
let p = password.value;
try{
await signInWithEmailAndPassword(auth,e,p);
msg.innerText="";
}catch{
msg.innerText="Error login";
}
};

window.salir = async () => {
await signOut(auth);
};

window.guardar = async () => {
let user = auth.currentUser;
if(!user)return;

await addDoc(collection(db,"agenda"),{
uid:user.uid,
titulo:titulo.value,
fecha:fecha.value,
tipo:tipo.value
});

titulo.value="";
fecha.value="";
tipo.value="";

ver();
};

async function ver(){
let user = auth.currentUser;
if(!user)return;

let q = query(collection(db,"agenda"),where("uid","==",user.uid));
let snap = await getDocs(q);

let html="";
snap.forEach(d=>{
let data=d.data();

html+=`
<div class="item">
<b>${data.titulo}</b><br>
${data.fecha} - ${data.tipo}<br>
<button onclick="borrar('${d.id}')">Eliminar</button>
</div>
`;
});

lista.innerHTML=html;
}

window.borrar = async (id) => {
await deleteDoc(doc(db,"agenda",id));
ver();
};

onAuthStateChanged(auth,(user)=>{
if(user){
loginBox.style.display="none";
appBox.style.display="block";
usuarioActivo.innerText=user.email;
ver();
}else{
appBox.style.display="none";
loginBox.style.display="block";
}
});

</script>

</body>
</html>
