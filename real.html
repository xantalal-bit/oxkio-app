<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oxkio Real</title>

<style>
body{margin:0;padding:20px;background:#020617;color:white;font-family:Arial}
.box{max-width:720px;margin:auto}
.logo{width:78px;height:78px;border-radius:16px;background:#111827;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.logo img{width:100%;height:100%}
input{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:1px solid #475569}
button{margin-top:10px;padding:10px;border:none;border-radius:12px;background:#2563eb;color:white}
.danger{background:#991b1b}
.success{background:#166534}
.card{margin-top:20px;background:#111827;padding:16px;border-radius:12px}
.item{padding:10px 0;border-bottom:1px solid #334155}
.pill{display:inline-block;padding:4px 10px;border-radius:999px;background:#1e293b;margin-top:6px}
.tachado{text-decoration:line-through;opacity:0.6}
</style>
</head>

<body>
<div class="box">

<div class="logo"><img src="logo.PNG"></div>

<h1>Oxkio</h1>

<div id="loginBox" class="card">
<input id="email" placeholder="Email">
<input id="password" placeholder="Contraseña">
<button id="btnRegistrar">Registrarme</button>
<button id="btnEntrar">Entrar</button>
<p id="msg"></p>
</div>

<div id="appBox" style="display:none">

<p>Usuario: <b id="usuarioActivo"></b></p>
<button id="btnSalir" class="danger">Salir</button>

<div class="card">
<h3>Nueva tarea</h3>
<input id="titulo" placeholder="Título">
<input id="fecha" placeholder="DD/MM/AAAA">
<input id="tipo" placeholder="Tipo">
<button id="btnGuardar">Guardar</button>
<p id="agendaMsg"></p>
</div>

<div class="card">
<h3>Hoy</h3>
<div id="listaHoy"></div>
</div>

<div class="card">
<h3>Semana</h3>
<div id="listaProximos"></div>
</div>

<div class="card">
<h3>Toda la agenda</h3>
<div id="agendaLista"></div>
</div>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, query, where, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
  authDomain: "oxkio-9af40.firebaseapp.com",
  projectId: "oxkio-9af40",
  storageBucket: "oxkio-9af40.firebasestorage.app",
  messagingSenderId: "975887789346",
  appId: "1:975887789346:web:fa581107285b989d90897b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function parseFecha(f){
let p=f.split("/");
if(p.length!==3)return null;
let d=new Date(p[2],p[1]-1,p[0]);
d.setHours(0,0,0,0);
return d;
}

function hoyTxt(){
let h=new Date();
return `${String(h.getDate()).padStart(2,"0")}/${String(h.getMonth()+1).padStart(2,"0")}/${h.getFullYear()}`;
}

function diasHasta(f){
let h=new Date();h.setHours(0,0,0,0);
return Math.round((f-h)/86400000);
}

async function ver(){
let user=auth.currentUser;
if(!user)return;

let q=query(collection(db,"agenda"),where("uid","==",user.uid));
let snap=await getDocs(q);

let hoyHTML="",proxHTML="",allHTML="";

snap.forEach(d=>{
let i=d.data();
let fecha=parseFecha(i.fecha);
let diff=fecha?diasHasta(fecha):null;

let tachado=i.estado==="realizado"?"tachado":"";

allHTML+=`
<div class="item">
<b class="${tachado}">${i.titulo}</b><br>
${i.fecha} - ${i.tipo}<br>
<button onclick="estado('${d.id}','${i.estado}')">
${i.estado==="realizado"?"Pendiente":"Hecho"}
</button>
</div>`;

if(i.fecha===hoyTxt() && i.estado!=="realizado"){
hoyHTML+=`<div class="item"><b>${i.titulo}</b></div>`;
}

if(diff!==null && diff>=0 && diff<=7 && i.estado!=="realizado"){
proxHTML+=`<div class="item"><b>${i.titulo}</b> (${diff} días)</div>`;
}

});

agendaLista.innerHTML=allHTML||"Vacío";
listaHoy.innerHTML=hoyHTML||"Nada hoy";
listaProximos.innerHTML=proxHTML||"Nada semana";

}

window.estado=async(id,est)=>{
await updateDoc(doc(db,"agenda",id),{
estado: est==="realizado"?"pendiente":"realizado"
});
ver();
};

btnRegistrar.onclick=async()=>{
await createUserWithEmailAndPassword(auth,email.value,password.value)
};

btnEntrar.onclick=async()=>{
await signInWithEmailAndPassword(auth,email.value,password.value)
};

btnSalir.onclick=()=>signOut(auth);

btnGuardar.onclick=async()=>{
await addDoc(collection(db,"agenda"),{
uid:auth.currentUser.uid,
titulo:titulo.value,
fecha:fecha.value,
tipo:tipo.value,
estado:"pendiente"
});
ver();
};

onAuthStateChanged(auth,u=>{
if(u){
loginBox.style.display="none";
appBox.style.display="block";
usuarioActivo.innerText=u.email;
ver();
}else{
loginBox.style.display="block";
appBox.style.display="none";
}
});

</script>
</body>
</html>
