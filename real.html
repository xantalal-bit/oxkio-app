<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oxkio Real</title>
  <style>
    body{margin:0;padding:20px;background:#020617;color:white;font-family:Arial,sans-serif}
    .box{max-width:700px;margin:auto}
    .logo{width:70px;height:70px;border-radius:14px;background:#111827;display:flex;align-items:center;justify-content:center;margin-bottom:16px;overflow:hidden;border:1px solid #334155}
    .logo img{width:100%;height:100%;object-fit:contain}
    input{width:100%;box-sizing:border-box;padding:12px;margin-top:10px;border-radius:10px;border:1px solid #475569;font-size:16px}
    button{margin-top:10px;margin-right:8px;padding:10px 16px;border:none;border-radius:10px;background:#2563eb;color:white;font-size:16px}
    .card{margin-top:20px;background:#111827;padding:16px;border-radius:12px}
    .danger{background:#991b1b}
    .item{padding:10px 0;border-bottom:1px solid #334155}
    .item:last-child{border-bottom:none}
    .msg{margin-top:10px;color:#cbd5e1}
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <img src="logo.PNG" alt="Logo Oxkio">
    </div>

    <h1>Oxkio Real</h1>
    <p>Acceso real con email y contraseña</p>

    <div id="loginBox" class="card">
      <h2>Acceso</h2>
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Contraseña">
      <button onclick="registrar()">Registrarme</button>
      <button onclick="entrar()">Entrar</button>
      <p id="msg" class="msg"></p>
    </div>

    <div id="appBox" class="card" style="display:none;">
      <h2>Sesión iniciada</h2>
      <p>Usuario: <b id="usuarioActivo"></b></p>
      <button class="danger" onclick="salir()">Salir</button>

      <div class="card">
        <h2>Agenda real</h2>
        <input id="titulo" placeholder="Título">
        <input id="fecha" placeholder="Fecha">
        <input id="tipo" placeholder="Tipo">
        <button onclick="guardarAgenda()">Guardar</button>
        <button onclick="verAgenda()">Ver agenda</button>
        <p id="agendaMsg" class="msg"></p>
      </div>

      <div class="card">
        <h2>Elementos guardados</h2>
        <div id="agendaLista"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
  apiKey: "AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
  authDomain: "oxkio-9af40.firebaseapp.com",
  projectId: "oxkio-9af40",
  storageBucket: "oxkio-9af40.firebasestorage.app",
  messagingSenderId: "975887789346",
  appId: "1:975887789346:web:fa581107285b989d90897b"
};

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginBox = document.getElementById("loginBox");
    const appBox = document.getElementById("appBox");
    const usuarioActivo = document.getElementById("usuarioActivo");
    const msg = document.getElementById("msg");
    const agendaMsg = document.getElementById("agendaMsg");
    const agendaLista = document.getElementById("agendaLista");

    window.registrar = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        msg.innerText = "Escribe email y contraseña.";
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        msg.innerText = "Usuario registrado.";
      } catch (e) {
        msg.innerText = "Error al registrar.";
      }
    };

    window.entrar = async function () {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!email || !password) {
        msg.innerText = "Escribe email y contraseña.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
        msg.innerText = "";
      } catch (e) {
        msg.innerText = "Error al entrar.";
      }
    };

    window.salir = async function () {
      await signOut(auth);
    };

    window.guardarAgenda = async function () {
      const user = auth.currentUser;
      const titulo = document.getElementById("titulo").value.trim();
      const fecha = document.getElementById("fecha").value.trim();
      const tipo = document.getElementById("tipo").value.trim();

      if (!user) {
        agendaMsg.innerText = "Debes iniciar sesión.";
        return;
      }

      if (!titulo || !fecha || !tipo) {
        agendaMsg.innerText = "Completa título, fecha y tipo.";
        return;
      }

      try {
        await addDoc(collection(db, "agenda"), {
          uid: user.uid,
          email: user.email,
          titulo: titulo,
          fecha: fecha,
          tipo: tipo,
          creadoEn: Date.now()
        });

        document.getElementById("titulo").value = "";
        document.getElementById("fecha").value = "";
        document.getElementById("tipo").value = "";

        agendaMsg.innerText = "Guardado en la nube.";
        await verAgenda();
      } catch (e) {
        agendaMsg.innerText = "Error al guardar.";
      }
    };

    window.verAgenda = async function () {
      const user = auth.currentUser;

      if (!user) {
        agendaLista.innerHTML = "";
        agendaMsg.innerText = "Debes iniciar sesión.";
        return;
      }

      try {
        const q = query(collection(db, "agenda"), where("uid", "==", user.uid));
        const snap = await getDocs(q);

        let html = "";

        if (snap.empty) {
          html = "<p>No hay elementos todavía.</p>";
        } else {
          let i = 1;
          snap.forEach((doc) => {
            const item = doc.data();
            html += `<div class="item"><b>${i}. ${item.titulo}</b><br>Fecha: ${item.fecha}<br>Tipo: ${item.tipo}</div>`;
            i++;
          });
        }

        agendaLista.innerHTML = html;
      } catch (e) {
        agendaMsg.innerText = "Error al leer agenda.";
      }
    };

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        loginBox.style.display = "none";
        appBox.style.display = "block";
        usuarioActivo.innerText = user.email;
        await verAgenda();
      } else {
        appBox.style.display = "none";
        loginBox.style.display = "block";
        usuarioActivo.innerText = "";
        agendaLista.innerHTML = "";
      }
    });
  </script>
</body>
</html>
