<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Oxkio</title>
  <style>
    body{
      background:#020617;
      color:white;
      font-family:Arial,sans-serif;
      padding:20px;
      margin:0;
    }
    .box{
      max-width:700px;
      margin:auto;
    }
    .logo{
      width:72px;
      height:72px;
      margin-bottom:12px;
      border-radius:12px;
      overflow:hidden;
      background:#111827;
      border:1px solid #334155;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .logo img{
      width:100%;
      height:100%;
      object-fit:contain;
    }
    h1{
      margin:0 0 16px 0;
      font-size:56px;
      line-height:1;
    }
    input{
      width:100%;
      box-sizing:border-box;
      padding:14px;
      margin-top:12px;
      border-radius:14px;
      border:1px solid #475569;
      font-size:16px;
      background:white;
      color:black;
    }
    button{
      margin-top:12px;
      margin-right:8px;
      padding:12px 18px;
      border:none;
      border-radius:14px;
      background:#2563eb;
      color:white;
      font-size:16px;
      cursor:pointer;
    }
    .secondary{
      background:#334155;
    }
    .success{
      background:#166534;
    }
    .danger{
      background:#991b1b;
    }
    .card{
      margin-top:20px;
      background:#111827;
      padding:18px;
      border-radius:18px;
    }
    .item{
      padding:12px 0;
      border-bottom:1px solid #334155;
    }
    .item:last-child{
      border-bottom:none;
    }
    .tachado{
      text-decoration:line-through;
      opacity:0.55;
    }
    .msg{
      margin-top:12px;
      color:#cbd5e1;
      line-height:1.4;
    }
    .muted{
      color:#cbd5e1;
    }
    .pill{
      display:inline-block;
      margin-top:6px;
      padding:4px 10px;
      border-radius:999px;
      background:#1e293b;
      color:#cbd5e1;
      font-size:13px;
    }
    .ok{
      background:#14532d;
      color:#dcfce7;
    }
    .pending{
      background:#3f2f0b;
      color:#fde68a;
    }
  </style>
</head>
<body>
  <div class="box">

    <div class="logo">
      <img src="logo.PNG" alt="Logo Oxkio" onerror="this.style.display='none';">
    </div>

    <h1>Oxkio</h1>

    <div id="login" class="card">
      <input id="email" type="email" placeholder="Email">
      <input id="password" type="password" placeholder="Contraseña">
      <button onclick="entrar()">Entrar</button>
      <button onclick="registrar()">Registrarme</button>
      <button class="secondary" onclick="recuperar()">Recuperar acceso</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="app" style="display:none;">
      <div class="card">
        <p><b id="user"></b></p>
        <button class="danger" onclick="salir()">Salir</button>
      </div>

      <div class="card">
        <h3>Nueva tarea</h3>
        <input id="titulo" placeholder="Título">
        <input id="fecha" placeholder="DD/MM/AAAA">
        <input id="tipo" placeholder="Tipo">
        <button onclick="guardar()">Guardar</button>
        <div id="agendaMsg" class="msg"></div>
      </div>

      <div class="card">
        <h3>Hoy</h3>
        <div id="hoy"></div>
      </div>

      <div class="card">
        <h3>Próximos días</h3>
        <div id="semana"></div>
      </div>

      <div class="card">
        <h3>Agenda completa</h3>
        <div id="total"></div>
      </div>
    </div>

  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      signOut,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getFirestore,
      collection,
      addDoc,
      getDocs,
      query,
      where,
      doc,
      updateDoc
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
      authDomain: "oxkio-9af40.firebaseapp.com",
      projectId: "oxkio-9af40",
      storageBucket: "oxkio-9af40.firebasestorage.app",
      messagingSenderId: "975887789346",
      appId: "1:975887789346:web:fa581107285b989d90897b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const loginBox = document.getElementById("login");
    const appBox = document.getElementById("app");
    const loginMsg = document.getElementById("loginMsg");
    const agendaMsg = document.getElementById("agendaMsg");
    const userEl = document.getElementById("user");

    function parseFecha(f) {
      if (!f) return null;
      const p = f.split("/");
      if (p.length !== 3) return null;

      const d = parseInt(p[0], 10);
      const m = parseInt(p[1], 10) - 1;
      const y = parseInt(p[2], 10);

      const fecha = new Date(y, m, d);
      if (
        fecha.getFullYear() !== y ||
        fecha.getMonth() !== m ||
        fecha.getDate() !== d
      ) return null;

      fecha.setHours(0, 0, 0, 0);
      return fecha;
    }

    function hoyStr() {
      const h = new Date();
      return `${String(h.getDate()).padStart(2, "0")}/${String(h.getMonth() + 1).padStart(2, "0")}/${h.getFullYear()}`;
    }

    function diasHasta(f) {
      const h = new Date();
      h.setHours(0, 0, 0, 0);
      return Math.round((f - h) / 86400000);
    }

    function traducirError(code) {
      switch (code) {
        case "auth/email-already-in-use":
          return "Ese email ya está registrado. Usa Entrar o Recuperar acceso.";
        case "auth/invalid-credential":
          return "Email o contraseña incorrectos.";
        case "auth/invalid-email":
          return "El email no es válido.";
        case "auth/weak-password":
          return "La contraseña debe tener al menos 6 caracteres.";
        case "auth/missing-password":
          return "Escribe la contraseña.";
        case "auth/too-many-requests":
          return "Demasiados intentos. Espera un poco y vuelve a probar.";
        default:
          return "Ha ocurrido un error. Revisa los datos e inténtalo de nuevo.";
      }
    }

    async function cargarAgenda() {
      const user = auth.currentUser;
      if (!user) return;

      const snap = await getDocs(
        query(collection(db, "agenda"), where("uid", "==", user.uid))
      );

      const items = [];
      snap.forEach((d) => {
        const i = d.data();
        items.push({
          id: d.id,
          titulo: i.titulo || "",
          fecha: i.fecha || "",
          tipo: i.tipo || "",
          estado: i.estado || "pendiente"
        });
      });

      items.sort((a, b) => {
        const fa = parseFecha(a.fecha);
        const fb = parseFecha(b.fecha);
        if (fa && fb) return fa - fb;
        if (fa) return -1;
        if (fb) return 1;
        return 0;
      });

      let hoyHTML = "";
      let semanaHTML = "";
      let totalHTML = "";

      for (const i of items) {
        const fechaObj = parseFecha(i.fecha);
        const diff = fechaObj ? diasHasta(fechaObj) : null;

        totalHTML += `
          <div class="item">
            <b class="${i.estado === "realizado" ? "tachado" : ""}">${i.titulo}</b><br>
            ${i.fecha} - ${i.tipo}<br>
            ${
              i.estado === "realizado"
                ? `<span class="pill ok">Realizado</span>`
                : `<button class="success" onclick="hecho('${i.id}')">Hecho</button>`
            }
          </div>
        `;

        if (i.estado === "realizado") continue;

        if (i.fecha === hoyStr()) {
          hoyHTML += `
            <div class="item">
              <b>${i.titulo}</b><br>
              <span class="pill pending">Hoy</span><br>
              <button class="success" onclick="hecho('${i.id}')">Hecho</button>
            </div>
          `;
        }

        if (diff !== null && diff >= 0 && diff <= 7) {
          semanaHTML += `
            <div class="item">
              <b>${i.titulo}</b><br>
              <span class="pill pending">En ${diff} día(s)</span><br>
              <button class="success" onclick="hecho('${i.id}')">Hecho</button>
            </div>
          `;
        }
      }

      document.getElementById("hoy").innerHTML = hoyHTML || "Nada hoy";
      document.getElementById("semana").innerHTML = semanaHTML || "Nada en próximos días";
      document.getElementById("total").innerHTML = totalHTML || "Sin datos";
    }

    window.hecho = async function(id) {
      await updateDoc(doc(db, "agenda", id), {
        estado: "realizado"
      });
      await cargarAgenda();
    };

    window.guardar = async function() {
      const user = auth.currentUser;
      const titulo = document.getElementById("titulo").value.trim();
      const fecha = document.getElementById("fecha").value.trim();
      const tipo = document.getElementById("tipo").value.trim();

      if (!user) {
        agendaMsg.innerText = "Debes iniciar sesión.";
        return;
      }

      if (!titulo || !fecha || !tipo) {
        agendaMsg.innerText = "Completa título, fecha y tipo.";
        return;
      }

      if (!parseFecha(fecha)) {
        agendaMsg.innerText = "La fecha debe ir en formato DD/MM/AAAA.";
        return;
      }

      await addDoc(collection(db, "agenda"), {
        uid: user.uid,
        titulo,
        fecha,
        tipo,
        estado: "pendiente"
      });

      document.getElementById("titulo").value = "";
      document.getElementById("fecha").value = "";
      document.getElementById("tipo").value = "";
      agendaMsg.innerText = "Guardado en la nube.";
      await cargarAgenda();
    };

    window.entrar = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      loginMsg.innerText = "";

      if (!email || !password) {
        loginMsg.innerText = "Escribe email y contraseña.";
        return;
      }

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (e) {
        loginMsg.innerText = traducirError(e.code);
      }
    };

    window.registrar = async function() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      loginMsg.innerText = "";

      if (!email || !password) {
        loginMsg.innerText = "Escribe email y contraseña.";
        return;
      }

      if (password.length < 6) {
        loginMsg.innerText = "La contraseña debe tener al menos 6 caracteres.";
        return;
      }

      try {
        await createUserWithEmailAndPassword(auth, email, password);
      } catch (e) {
        loginMsg.innerText = traducirError(e.code);
      }
    };

    window.recuperar = async function() {
      const email = document.getElementById("email").value.trim();
      loginMsg.innerText = "";

      if (!email) {
        loginMsg.innerText = "Escribe tu email y luego pulsa Recuperar acceso.";
        return;
      }

      try {
        await sendPasswordResetEmail(auth, email);
        loginMsg.innerText = "Te he enviado un correo para restablecer la contraseña.";
      } catch (e) {
        loginMsg.innerText = traducirError(e.code);
      }
    };

    window.salir = async function() {
      await signOut(auth);
    };

    onAuthStateChanged(auth, async (u) => {
      if (u) {
        loginBox.style.display = "none";
        appBox.style.display = "block";
        userEl.innerText = u.email;
        loginMsg.innerText = "";
        await cargarAgenda();
      } else {
        loginBox.style.display = "block";
        appBox.style.display = "none";
      }
    });
  </script>
</body>
</html>
