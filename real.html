<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Oxkio</title>

<style>
body{background:#020617;color:white;font-family:Arial,sans-serif;margin:0;padding:20px}
.box{max-width:720px;margin:auto}
h1{margin:0 0 12px 0}
.card{margin-top:16px;background:#111827;padding:16px;border-radius:14px}
input{width:100%;box-sizing:border-box;padding:12px;margin-top:10px;border-radius:12px;border:1px solid #475569;background:white;color:black}
button{margin-top:10px;margin-right:8px;padding:10px 14px;border:none;border-radius:12px;background:#2563eb;color:white;cursor:pointer}
.secondary{background:#334155}
.success{background:#166534}
.danger{background:#991b1b}
.item{padding:10px 0;border-bottom:1px solid #334155}
.item:last-child{border-bottom:none}
.msg{margin-top:10px;color:#cbd5e1}
.badge{display:inline-block;margin-top:6px;padding:3px 8px;border-radius:999px;background:#1e293b;color:#cbd5e1;font-size:12px}
</style>
</head>

<body>
<div class="box">

<h1>Oxkio</h1>

<!-- LOGIN -->
<div id="login" class="card">
  <input id="email" type="email" placeholder="Email">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="entrar()">Entrar</button>
  <button onclick="registrar()">Registrarme</button>
  <button class="secondary" onclick="recuperar()">Recuperar acceso</button>
  <div id="loginMsg" class="msg"></div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <div class="card">
    <p><b id="user"></b></p>
    <button class="danger" onclick="salir()">Salir</button>
  </div>

  <!-- NUEVA TAREA -->
  <div class="card">
    <h3>Nueva tarea</h3>
    <input id="titulo" placeholder="Título">
    <input id="fecha" placeholder="DD/MM/AAAA">
    <input id="tipo" placeholder="Tipo">
    <button onclick="guardar()">Guardar</button>
    <div id="agendaMsg" class="msg"></div>
  </div>

  <!-- HOY -->
  <div class="card">
    <h3>Hoy</h3>
    <div id="hoy"></div>
  </div>

  <!-- SEMANA -->
  <div class="card">
    <h3>
      Semana
      <button class="secondary" onclick="toggleSemana()">Mostrar / Ocultar</button>
    </h3>
    <div id="semana" style="display:none;"></div>
  </div>

  <!-- DOCUMENTACIÓN (BASE) -->
  <div class="card">
    <h3>Documentación</h3>
    <div class="msg">
      Carpeta base preparada.<br>
      Aquí aparecerán documentos detectados para revisión y avisos.
    </div>
  </div>

  <!-- CORREO (BASE) -->
  <div class="card">
    <h3>Correo</h3>
    <div class="msg">
      Módulo preparado.<br>
      Próximo paso: detectar emails, organizar y proponer respuestas.
    </div>
  </div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword,
  onAuthStateChanged, signOut, sendPasswordResetEmail
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, getDocs, query, where, doc, updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDFySiO23mqJilJPUfE-dLv9Zbs9gcY_kg",
  authDomain: "oxkio-9af40.firebaseapp.com",
  projectId: "oxkio-9af40",
  storageBucket: "oxkio-9af40.firebasestorage.app",
  messagingSenderId: "975887789346",
  appId: "1:975887789346:web:fa581107285b989d90897b"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const loginBox = document.getElementById("login");
const appBox = document.getElementById("app");
const loginMsg = document.getElementById("loginMsg");
const agendaMsg = document.getElementById("agendaMsg");

function parseFecha(f){
  if(!f) return null;
  const p=f.split("/");
  if(p.length!==3) return null;
  const d=new Date(p[2],p[1]-1,p[0]);
  if(isNaN(d)) return null;
  d.setHours(0,0,0,0);
  return d;
}

function hoyStr(){
  const h=new Date();
  return `${String(h.getDate()).padStart(2,"0")}/${String(h.getMonth()+1).padStart(2,"0")}/${h.getFullYear()}`;
}

function diasHasta(f){
  const h=new Date(); h.setHours(0,0,0,0);
  return Math.round((f-h)/86400000);
}

let semanaVisible=false;
window.toggleSemana=()=>{
  semanaVisible=!semanaVisible;
  document.getElementById("semana").style.display = semanaVisible ? "block" : "none";
};

async function cargar(){
  const user=auth.currentUser;
  if(!user) return;

  const snap = await getDocs(query(collection(db,"agenda"),where("uid","==",user.uid)));

  let hoyHTML="";
  let semanaHTML="";

  snap.forEach(d=>{
    const i=d.data();

    // ocultar realizados en vista ejecutiva
    if(i.estado==="realizado") return;

    const fecha=parseFecha(i.fecha);
    const diff=fecha?diasHasta(fecha):null;

    if(i.fecha===hoyStr()){
      hoyHTML+=`
        <div class="item">
          <b>${i.titulo}</b><br>
          <span class="badge">Hoy</span><br>
          <button class="success" onclick="hecho('${d.id}')">Hecho</button>
        </div>`;
    }

    if(diff!==null && diff>=0 && diff<=7){
      semanaHTML+=`
        <div class="item">
          <b>${i.titulo}</b><br>
          <span class="badge">En ${diff} día(s)</span><br>
          <button class="success" onclick="hecho('${d.id}')">Hecho</button>
        </div>`;
    }
  });

  document.getElementById("hoy").innerHTML = hoyHTML || "Nada hoy";
  document.getElementById("semana").innerHTML = semanaHTML || "Nada en próximos días";
}

window.hecho=async(id)=>{
  await updateDoc(doc(db,"agenda",id),{ estado:"realizado" });
  await cargar();
};

window.guardar=async()=>{
  const user=auth.currentUser;
  const titulo=document.getElementById("titulo").value.trim();
  const fecha=document.getElementById("fecha").value.trim();
  const tipo=document.getElementById("tipo").value.trim();

  if(!user){ agendaMsg.innerText="Inicia sesión."; return; }
  if(!titulo||!fecha||!tipo){ agendaMsg.innerText="Completa todo."; return; }
  if(!parseFecha(fecha)){ agendaMsg.innerText="Fecha DD/MM/AAAA."; return; }

  await addDoc(collection(db,"agenda"),{
    uid:user.uid, titulo, fecha, tipo, estado:"pendiente"
  });

  document.getElementById("titulo").value="";
  document.getElementById("fecha").value="";
  document.getElementById("tipo").value="";
  agendaMsg.innerText="Guardado.";
  await cargar();
};

function traducir(code){
  if(code==="auth/email-already-in-use") return "Email ya registrado.";
  if(code==="auth/invalid-credential") return "Email o contraseña incorrectos.";
  return "Error.";
}

window.entrar=async()=>{
  try{
    await signInWithEmailAndPassword(auth,email.value,password.value);
  }catch(e){ loginMsg.innerText=traducir(e.code); }
};

window.registrar=async()=>{
  try{
    await createUserWithEmailAndPassword(auth,email.value,password.value);
  }catch(e){ loginMsg.innerText=traducir(e.code); }
};

window.recuperar=async()=>{
  if(!email.value){ loginMsg.innerText="Escribe email."; return; }
  try{
    await sendPasswordResetEmail(auth,email.value);
    loginMsg.innerText="Correo enviado.";
  }catch(e){ loginMsg.innerText="No se pudo enviar."; }
};

window.salir=()=>signOut(auth);

onAuthStateChanged(auth, async u=>{
  if(u){
    loginBox.style.display="none";
    appBox.style.display="block";
    document.getElementById("user").innerText=u.email;
    await cargar();
  }else{
    loginBox.style.display="block";
    appBox.style.display="none";
  }
});
</script>
</body>
</html>
